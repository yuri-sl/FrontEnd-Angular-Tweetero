<p-toast position="top-right"></p-toast>
<div class="bg-gradient-to-r from-blue-300 to-blue-700 w-screen flex items-center justify-center h-screen">
    <!--Feed Wrapper-->
    <div class="w-7xl bg-white/95 shadow-xl mx-auto max-w-xl min-h-screen">
        <!--Feed-->
        <section class="sticky top-0 z-10 bg-white/90 backdrop-blur border-b px-4 py-3">
            <h1 class="text-lg font-semibold">Últimas atualizações</h1>
            <p class="text-sm text-gray-500">O que rolou recentemente</p>
        </section>
        <div class="top-3/6 h-screen bg-red-400">
            @for (item of listaTweets; track $index) {
                <!--Tweet-->
                <article class="z-15 bg-white border border-solid border-gray-400 shadow-lg flex flex-row justify-center">
                    <img [src]="item.user.avatar" class="avatar" alt="avatar">
                    <div class="tweet-content">
                        <header class="tweet-header">
                            <h2 class="text-blue-700 font-bold">{{item.user.username}}</h2>
                        </header>
                        <p class="tweet-text">{{item.text}}</p>
                    </div>
                    <p-button class="bg-blue-400 rounded-md h-fit w-fit border border-solid b-2 shadow-lg text-white font-semibold hover: font-bold bg-blue-700" (click)="redirecionarPerfil(item.id)">
                        Acessar perfil
                    </p-button>
                </article>
            }
        </div>
        <div class="sticky z-10 bg-gray-300 flex flex-row bottom-0 justify-center items-center">
            <form [formGroup]="postNewTweetForm" (ngSubmit)="postarTweet()">
                <input 
                 class="h-fit w-50 border border-solid border-black bg-white rounded-md shadow-2xl text-black font-semibold"
                 type="text" 
                 formControlName="text"
                 >
                <p-button class="gap-8" type="submit" label="Enviar" icon="pi pi-send"></p-button>
            </form>
        
        </div>
    </div>
</div>
