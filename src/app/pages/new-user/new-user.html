<p-toast position="top-right"></p-toast>
<div class="bg-linear-to-r from-blue-200 to-blue-400 w-screen flex items-center justify-center h-screen">
  <div class="bg-white rounded-2xl p-10 w-125 shadow-2xl">

    <div class="flex items-center justify-center gap-3 pb-8">
      <img
        src="https://drive.google.com/thumbnail?id=1H8gyTmXRY5g4lts_I6jKclpQDjNEMS4w&sz=w512"
        alt="chirp-logo"
        class="w-12 h-12 rounded-full object-cover"
      />
      <h1 class="text-2xl font-bold text-blue-800">Tweetero</h1>
    </div>

    @if (fazerLogin) {
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="flex flex-col gap-4">
        <h2 class="text-lg font-semibold text-gray-700">Entrar na sua conta</h2>

        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-600">Nome de usuário</label>
          <input
            type="text"
            formControlName="username"
            class="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="joao_123"
          />
        </div>

        <div class="flex flex-row justify-between items-center pt-1">
          <p-button
            type="reset"
            label="Limpar"
            variant="text"
            severity="danger"
          />
          <p-button
            type="button"
            label="Criar conta"
            variant="text"
            severity="secondary"
            (click)="alternarLoginCadastro()"
          />
        </div>

        <p-button
          label="Entrar"
          type="submit"
          styleClass="w-full justify-center"
        ></p-button>
      </form>
    } @else {
      <form [formGroup]="cadastroForm" (ngSubmit)="onRegister()" class="flex flex-col gap-4">
        <h2 class="text-lg font-semibold text-gray-700">Criar nova conta</h2>

        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-600">Nome de usuário</label>
          <input
            type="text"
            formControlName="username"
            class="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="joao_123"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-600">URL do avatar</label>
          <input
            type="text"
            formControlName="avatar"
            class="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="https://exemplo.com/imagem.png"
          />
        </div>

        <div class="flex flex-row justify-between items-center pt-1">
          <p-button
            type="reset"
            label="Limpar"
            variant="text"
            severity="danger"
          />
          <p-button
            type="button"
            label="Já tenho conta"
            variant="text"
            severity="secondary"
            (click)="alternarLoginCadastro()"
          />
        </div>

        <p-button
          label="Criar conta"
          type="submit"
          styleClass="w-full justify-center"
        ></p-button>
      </form>
    }

  </div>
</div>
