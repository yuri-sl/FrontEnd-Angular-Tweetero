<div class="bg-gradient-to-r from-blue-200 to-blue-400 w-screen flex items-center justify-center h-screen">
    <div class="bg-white rounded-xl p-10 w-125  shadow-2xl">
        <div class="flex items-center justify-center pb-8">
            <img
                src="https://drive.google.com/thumbnail?id=1H8gyTmXRY5g4lts_I6jKclpQDjNEMS4w&sz=w512"
                alt="chirp-logo"
                class="w-12 h-12 rounded-full object-cover"
            />
            <h1 class="flex justify-center text-2xl font-bold text-blue-800">Tweetero</h1>
        </div>
        @if (fazerLogin) {
            <form [formGroup]="cadastrarUsuarioForm" (ngSubmit)="onSubmit()">
                <label>Nome de usuário:</label>
                <input type="text" formControlName="username" class="border border-solid rounded-md p-2 border-black"
                placeholder="joao_123">
                <label>Senha:</label>
                <input type="password" class="border border-solid rounded-md p-2 border-black" placeholder="Insira sua senha">
                <div class="w-auto flex flex-row gap-8px place-content-between">
                    <p-button class="text-red-500 font-sans hover:text-red-800 hover:font-bold transition-colors duration-200" type="reset" label="Limpar Campos" variant="text" severity="danger" />
                    <p-button class="text-red-500 font-sans hover:text-red-800 hover:font-bold transition-colors duration-200" (click)="alternarLoginCadastro()" type="button" label="Criar conta" variant="text" severity="danger" />
                </div>
                <p-button label="Entrar" 
                class="bg-blue-300 text-white font-sans text-2xl hover:bg-blue-600 hover:font-bold hover:cursor-pointer transition-colors duration-200 w-auto h-auto p-4 flex items-center justify-center" 
                type="submit" ></p-button>
            <p-button 
                label="Entrar com Google" 
                class="bg-gray-300 text-white font-sans text-2xl hover:bg-gray-600 hover:font-bold hover:cursor-pointer transition-colors duration-200 w-auto h-auto flex items-center justify-center" 
                type="submit" >
                <img class="" width="50px" src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" alt="logo google">
            </p-button>
            </form>

        }
        @else {
            <form [formGroup]="cadastrarUsuarioForm" (ngSubmit)="onSubmit()">
                <label>Nome de usuário:</label>
                <input type="text" formControlName="username" class="border border-solid rounded-md p-2 border-black"
                placeholder="joao_123">
                <label>Avatar:</label>
                <input type="text" placeholder="Insira o URL da sua imagem de perfil" formControlName="avatar" class="border border-solid border-black rounded-md p-2">
                <label>Senha:</label>
                <input type="password" class="border border-solid rounded-md p-2 border-black" placeholder="Insira sua senha">
                <div class="w-auto flex flex-row gap-8px place-content-between">
                    <p-button class="text-red-500 font-sans hover:text-red-800 hover:font-bold transition-colors duration-200" type="reset" label="Limpar Campos" variant="text" severity="danger" />
                    <p-button class="text-red-500 font-sans hover:text-red-800 hover:font-bold transition-colors duration-200" (click)="alternarLoginCadastro()" type="button" label="Já tenho conta" variant="text" severity="danger" />
                </div>
                <p-button label="Criar conta" 
                class="bg-blue-300 text-white font-sans text-2xl hover:bg-blue-600 hover:font-bold hover:cursor-pointer transition-colors duration-200 w-auto h-auto p-4 flex items-center justify-center" 
                type="submit" ></p-button>
            </form>
        }
    </div>
</div>
