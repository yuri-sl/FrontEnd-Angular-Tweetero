<p-toast position="top-right" />

<div class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Brand header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-500 rounded-full mb-4 shadow-lg shadow-blue-500/40">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.733-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-white tracking-tight">Tweetero</h1>
      <p class="text-slate-400 mt-1 text-sm">Compartilhe seus pensamentos com o mundo</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl shadow-black/30 p-8">

      @if (fazerLogin) {

        <!-- LOGIN -->
        <h2 class="text-2xl font-bold text-gray-900 mb-1">Bem-vindo de volta</h2>
        <p class="text-gray-500 text-sm mb-6">Entre com seu nome de usuário</p>

        <form [formGroup]="fazerLoginForm" (ngSubmit)="loginSubmit()" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Nome de usuário</label>
            <input
              type="text"
              formControlName="nome"
              placeholder="joao_silva"
              autocomplete="username"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition text-gray-900 placeholder-gray-400"
            />
          </div>

          <button
            type="submit"
            [disabled]="loading"
            class="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 disabled:bg-blue-300 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2 cursor-pointer"
          >
            @if (loading) {
              <span class="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
            }
            Entrar
          </button>

          <p class="text-center text-gray-500 text-sm pt-1">
            Não tem conta?
            <button type="button" (click)="alternarLoginCadastro()"
              class="text-blue-500 hover:text-blue-700 font-semibold transition-colors cursor-pointer ml-1">
              Criar uma agora
            </button>
          </p>
        </form>

      } @else {

        <!-- REGISTER -->
        <h2 class="text-2xl font-bold text-gray-900 mb-1">Criar conta</h2>
        <p class="text-gray-500 text-sm mb-6">Junte-se à comunidade Tweetero</p>

        <form [formGroup]="cadastrarUsuarioForm" (ngSubmit)="onSubmit()" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Nome de usuário</label>
            <input
              type="text"
              formControlName="username"
              placeholder="joao_silva"
              autocomplete="username"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition text-gray-900 placeholder-gray-400"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">URL da foto de perfil</label>
            <input
              type="url"
              formControlName="avatar"
              placeholder="https://exemplo.com/foto.jpg"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition text-gray-900 placeholder-gray-400"
            />
            <p class="text-xs text-gray-400 mt-1.5">Cole o link de uma imagem pública</p>
          </div>

          <button
            type="submit"
            [disabled]="loading"
            class="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 disabled:bg-blue-300 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2 cursor-pointer"
          >
            @if (loading) {
              <span class="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
            }
            Criar conta
          </button>

          <p class="text-center text-gray-500 text-sm pt-1">
            Já tem conta?
            <button type="button" (click)="alternarLoginCadastro()"
              class="text-blue-500 hover:text-blue-700 font-semibold transition-colors cursor-pointer ml-1">
              Entrar
            </button>
          </p>
        </form>

      }
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">© 2025 Tweetero</p>
  </div>
</div>
